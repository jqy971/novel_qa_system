<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说智能问答系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; color: white; padding: 30px 0; }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .main-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
        .sidebar { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .upload-area {
            border: 2px dashed #ddd; border-radius: 12px; padding: 30px;
            text-align: center; cursor: pointer; margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        #fileInput { display: none; }
        .novel-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
        .novel-item:hover { background: #f5f5f5; }
        .novel-item.active { background: #f0f2ff; border: 1px solid #667eea; }
        .main-content { background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; }
        .message-user { text-align: right; }
        .message-content { display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 12px; }
        .message-user .message-content { background: #667eea; color: white; }
        .message-assistant .message-content { background: #f5f5f5; color: #333; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9em; }
        .btn-primary { background: #667eea; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { text-align: center; padding: 20px; color: #999; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .sources { margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; font-size: 0.85em; }
        .sources-title { color: #667eea; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 智能辅助阅读系统</h1>
            <p>基于RAG的单本小说问答与辅助阅读助手</p>
        </div>
        
        <div class="main-layout">
            <div class="sidebar">
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <p>📄 点击或拖拽上传TXT小说</p>
                    <p style="font-size: 0.8em; color: #999; margin-top: 8px;">支持 .txt 格式</p>
                </div>
                <input type="file" id="fileInput" accept=".txt" onchange="uploadNovel(event)">
                
                <h3 style="margin-bottom: 15px; color: #667eea;">我的小说</h3>
                <div id="novelList" class="novel-list"></div>
            </div>
            
            <div class="main-content">
                <div class="chat-header">
                    <h2 id="currentNovelTitle">请选择或上传一本小说</h2>
                </div>
                
                <div id="messages" class="messages">
                    <div class="empty-state">
                        <p>👈 请先选择左侧的小说开始对话</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">你可以问：剧情、人物、续写等问题</p>
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';  // 使用相对路径，同域名访问
        let currentNovelId = null;
        let isLoading = false;

        // 页面加载时获取小说列表
        window.onload = function() {
            loadNovels();
        };

        // 上传小说
        async function uploadNovel(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            showLoading('正在处理小说，请稍候...');
            
            try {
                const response = await fetch(`${API_BASE}/api/novels/upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(`上传成功！\n小说：${result.title}\n章节数：${result.chapter_count}`);
                    loadNovels();
                    selectNovel(result.novel_id, result.title);
                } else {
                    alert('上传失败：' + (result.detail || '未知错误'));
                }
            } catch (error) {
                alert('上传出错：' + error.message);
            }
            hideLoading();
        }

        // 获取小说列表
        async function loadNovels() {
            try {
                const response = await fetch(`${API_BASE}/api/novels`);
                const result = await response.json();
                renderNovelList(result.novels);
            } catch (error) {
                console.error('加载小说列表失败:', error);
            }
        }

        // 渲染小说列表
        function renderNovelList(novels) {
            const listEl = document.getElementById('novelList');
            if (novels.length === 0) {
                listEl.innerHTML = '<p style="color: #999; text-align: center;">暂无小说</p>';
                return;
            }
            
            listEl.innerHTML = novels.map(novel => `
                <div class="novel-item ${novel.id === currentNovelId ? 'active' : ''}" 
                     onclick="selectNovel('${novel.id}', '${novel.title}')">
                    <div class="title">${novel.title}</div>
                    <div class="meta">${novel.chapter_count}章 · ${formatNumber(novel.total_chars)}字</div>
                </div>
            `).join('');
        }

        // 选择小说
        function selectNovel(id, title) {
            currentNovelId = id;
            document.getElementById('currentNovelTitle').textContent = title;
            document.getElementById('messages').innerHTML = '';
            loadNovels(); // 刷新列表高亮
            
            // 添加欢迎消息
            addMessage('assistant', `已选择《${title}》，你可以问我：\n• 剧情相关问题\n• 人物介绍\n• 帮我续写某段情节\n• 总结某章内容`);
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const query = input.value.trim();
            
            if (!query) return;
            if (!currentNovelId) {
                alert('请先选择一本小说');
                return;
            }
            
            input.value = '';
            addMessage('user', query);
            showLoading('思考中...');
            
            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        novel_id: currentNovelId,
                        query: query,
                        stream: false
                    })
                });
                
                const result = await response.json();
                hideLoading();
                
                if (result.success) {
                    addMessage('assistant', result.answer, result.sources);
                } else {
                    addMessage('assistant', '抱歉，处理出错：' + (result.error || '未知错误'));
                }
            } catch (error) {
                hideLoading();
                addMessage('assistant', '请求失败：' + error.message);
            }
        }

        // 添加消息到界面
        function addMessage(role, content, sources = null) {
            const messagesEl = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${role}`;
            
            let html = `<div class="message-content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
            
            if (sources && sources.length > 0) {
                html += `<div class="sources">
                    <div class="sources-title">📖 参考来源</div>
                    ${sources.map(s => `<div>• ${s.chapter}</div>`).join('')}
                </div>`;
            }
            
            messageEl.innerHTML = html;
            messagesEl.appendChild(messageEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 显示加载状态
        function showLoading(text) {
            isLoading = true;
            const messagesEl = document.getElementById('messages');
            const loadingEl = document.createElement('div');
            loadingEl.id = 'loadingIndicator';
            loadingEl.className = 'loading';
            loadingEl.textContent = text;
            messagesEl.appendChild(loadingEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // 隐藏加载状态
        function hideLoading() {
            isLoading = false;
            const loadingEl = document.getElementById('loadingIndicator');
            if (loadingEl) loadingEl.remove();
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            return num.toString();
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
